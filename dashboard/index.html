<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrAIght Shot — Live Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  body { background: #0A0A0A; color: #e2e1eb; font-family: Inter, sans-serif; }
  .gradient-bg { background: radial-gradient(ellipse at 50% -20%, rgba(245,158,11,0.12) 0%, transparent 60%); }
  .card { background: #12131a; border: 1px solid #33343c; border-radius: 4px; }
  .input-field { background: #0c0e14; border: 1px solid #33343c; color: #e2e1eb; font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 12px 16px; border-radius: 4px; width: 100%; outline: none; transition: border-color 0.2s; }
  .input-field:focus { border-color: #F59E0B; box-shadow: 0 0 0 1px rgba(245,158,11,0.3); }
  .btn-primary { background: #F59E0B; color: #000; font-weight: 600; padding: 12px 24px; border-radius: 4px; border: none; cursor: pointer; font-family: Inter, sans-serif; font-size: 16px; transition: all 0.2s; }
  .btn-primary:hover { background: #ffc174; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  #dashboard-frame { width: 100%; height: 100vh; border: none; display: none; }
  .error-msg { color: #ffb4ab; font-size: 13px; margin-top: 8px; display: none; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid transparent; border-top-color: #000; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="min-h-screen gradient-bg">

<!-- LOGIN VIEW -->
<div id="login-view" class="flex items-center justify-center min-h-screen p-6">
  <div class="card p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-4 px-3 py-1 rounded border border-[#F59E0B]/30 bg-[#F59E0B]/5">
        <span class="w-2 h-2 rounded-full bg-[#00FF94]"></span>
        <span class="text-[#F59E0B] font-mono text-xs tracking-wide">THREE CHANNELS. ONE VERDICT.</span>
      </div>
      <h1 class="text-3xl font-bold mb-2">StrAIght Shot</h1>
      <p class="text-sm text-[#d8c3ad]">Live LLM safety monitoring dashboard</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs text-[#d8c3ad] mb-1 font-mono uppercase tracking-wide">RunPod URL</label>
        <input id="runpod-url" class="input-field" type="text" placeholder="https://pod-id-8099.proxy.runpod.net" autocomplete="off">
      </div>
      <div>
        <label class="block text-xs text-[#d8c3ad] mb-1 font-mono uppercase tracking-wide">API Key</label>
        <input id="api-key" class="input-field" type="password" placeholder="sk-..." autocomplete="off">
      </div>
      <div id="error-msg" class="error-msg"></div>
      <button id="connect-btn" class="btn-primary w-full flex items-center justify-center gap-2" onclick="connect()">
        <span>Connect</span>
      </button>
    </div>

    <div class="mt-8 pt-6 border-t border-white/10">
      <p class="text-xs text-[#d8c3ad]/50 text-center">
        Don't have an API key? <a href="https://github.com/noirsys/straightshot" class="text-[#F59E0B] hover:underline">Get one at github.com/noirsys/straightshot</a>
      </p>
    </div>
  </div>
</div>

<!-- DASHBOARD VIEW (iframe) -->
<iframe id="dashboard-frame" allow="clipboard-write"></iframe>

<script>
const loginView = document.getElementById('login-view');
const dashboardFrame = document.getElementById('dashboard-frame');
const errorMsg = document.getElementById('error-msg');
const connectBtn = document.getElementById('connect-btn');

async function connect() {
  const url = document.getElementById('runpod-url').value.trim();
  const key = document.getElementById('api-key').value.trim();

  if (!url) { showError('Enter the RunPod URL'); return; }
  if (!key) { showError('Enter your API key'); return; }

  // Normalize URL
  let base = url.replace(/\/+$/, '');
  if (!base.startsWith('http')) base = 'https://' + base;

  // Verify connection
  errorMsg.style.display = 'none';
  connectBtn.disabled = true;
  connectBtn.innerHTML = '<span class="spinner"></span><span>Connecting...</span>';

  try {
    const resp = await fetch(base + '/health');
    if (!resp.ok) throw new Error('Pod returned ' + resp.status);
    const data = await resp.json();
    if (!data.straightshot) throw new Error('StrAIght Shot not initialized on pod');
  } catch (e) {
    showError('Cannot reach pod: ' + e.message);
    connectBtn.disabled = false;
    connectBtn.innerHTML = '<span>Connect</span>';
    return;
  }

  // Load dashboard
  loginView.style.display = 'none';
  dashboardFrame.style.display = 'block';
  dashboardFrame.src = base + '/?api_key=' + encodeURIComponent(key);
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
}

// Handle Enter key
document.getElementById('api-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});
document.getElementById('runpod-url').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('api-key').focus();
});

// Restore from session
const saved = sessionStorage.getItem('straightshot_connect');
if (saved) {
  try {
    const { url, key } = JSON.parse(saved);
    document.getElementById('runpod-url').value = url;
    document.getElementById('api-key').value = key;
    connect();
  } catch(e) {}
}

// Save on successful connect
const origOpen = XMLHttpRequest.prototype.open;
XMLHttpRequest.prototype.open = function() {
  this.addEventListener('load', function() {
    if (this.responseURL && this.responseURL.includes('/health')) {
      sessionStorage.setItem('straightshot_connect', JSON.stringify({
        url: document.getElementById('runpod-url').value.trim(),
        key: document.getElementById('api-key').value.trim()
      }));
    }
  });
  return origOpen.apply(this, arguments);
};
</script>
</body>
</html>
